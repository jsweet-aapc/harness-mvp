<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harness</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #020617; color: #e2e8f0; overscroll-behavior: none; }
    .prose-invert h1, .prose-invert h2, .prose-invert h3 { color: #f1f5f9; font-weight: 600; margin-top: 1.2em; margin-bottom: 0.5em; }
    .prose-invert h1 { font-size: 1.5em; }
    .prose-invert h2 { font-size: 1.25em; }
    .prose-invert h3 { font-size: 1.1em; }
    .prose-invert p { margin: 0.5em 0; line-height: 1.6; color: #cbd5e1; }
    .prose-invert ul, .prose-invert ol { margin: 0.5em 0; padding-left: 1.5em; color: #cbd5e1; }
    .prose-invert li { margin: 0.2em 0; }
    .prose-invert code { background: #1e293b; padding: 0.15em 0.3em; border-radius: 3px; font-size: 0.9em; color: #e2e8f0; }
    .prose-invert pre { background: #0f172a; padding: 0.8em; border-radius: 6px; overflow-x: auto; border: 1px solid #1e293b; }
    .prose-invert pre code { background: transparent; padding: 0; }
    .prose-invert a { color: #a78bfa; text-decoration: underline; }
    .prose-invert blockquote { border-left: 3px solid #475569; padding-left: 1em; color: #94a3b8; margin: 0.5em 0; font-style: italic; }
    .prose-invert hr { border: none; border-top: 1px solid #334155; margin: 1.5em 0; }
    .prose-invert table { border-collapse: collapse; margin: 0.8em 0; }
    .prose-invert th, .prose-invert td { border: 1px solid #334155; padding: 0.4em 0.7em; }
    .prose-invert th { background: #1e293b; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #475569; }
    textarea, input { font-family: inherit; }
    .focus-ring:focus { outline: 2px solid #7c3aed; outline-offset: 1px; }
    /* Animated dot for "thinking" */
    @keyframes pulse-dot { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
    .dot { animation: pulse-dot 1.4s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.16s; }
    .dot:nth-child(3) { animation-delay: 0.32s; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // =====================================================================
    // ICONS
    // =====================================================================
    const Icons = {
      chat: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
      doc: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
      database: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg>,
      brain: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>,
      clock: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      spark: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>,
      settings: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
      plus: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      trash: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
      send: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
      menu: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
      x: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      check: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      chevronDown: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
      chevronRight: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
      edit: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      eye: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
      capture: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
      search: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      folder: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
      help: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
    };

    const Icon = ({ name, className = "w-5 h-5" }) => {
      const svg = Icons[name] || Icons.help;
      return <span className={`inline-flex items-center justify-center ${className}`} style={{ width: '1em', height: '1em' }}>
        {React.cloneElement(svg, { width: '100%', height: '100%' })}
      </span>;
    };

    // =====================================================================
    // CONSTANTS
    // =====================================================================
    const STORAGE_KEY = 'harness:v1';

    const MODELS = [
      { id: 'claude-sonnet-4-6', name: 'Sonnet 4.6', desc: 'Default — balanced' },
      { id: 'claude-opus-4-7', name: 'Opus 4.7', desc: 'Hard reasoning' },
      { id: 'claude-haiku-4-5', name: 'Haiku 4.5', desc: 'Fast & cheap' },
    ];

    const FIELD_TYPES = [
      { id: 'text', name: 'Text' },
      { id: 'longtext', name: 'Long text' },
      { id: 'number', name: 'Number' },
      { id: 'date', name: 'Date' },
      { id: 'select', name: 'Single select' },
      { id: 'multiselect', name: 'Multi-select' },
      { id: 'boolean', name: 'Checkbox' },
    ];

    const MEMORY_BUCKETS = [
      { id: 'about_me', name: 'About me', desc: 'Preferences, voice, constraints, who I am' },
      { id: 'project', name: 'Project state', desc: 'Decisions, status, open questions' },
      { id: 'reference', name: 'Reference library', desc: 'Knowledge Claude can cite' },
    ];

    const SKILL_MODES = [
      { id: 'force_inject', name: 'Force-inject', desc: 'Always in system prompt' },
      { id: 'manual', name: 'Manual update', desc: 'Claude proposes, you approve' },
      { id: 'semi_auto', name: 'Semi-auto', desc: 'Claude edits, logged for review' },
    ];

    // =====================================================================
    // UTILITIES
    // =====================================================================
    const uid = () => Math.random().toString(36).substring(2, 12);
    const now = () => new Date().toISOString();
    const fmtDate = (iso) => {
      const d = new Date(iso);
      const today = new Date();
      const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
      const isToday = d.toDateString() === today.toDateString();
      const isYesterday = d.toDateString() === yesterday.toDateString();
      const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      if (isToday) return `Today, ${time}`;
      if (isYesterday) return `Yesterday, ${time}`;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ', ' + time;
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const s = JSON.parse(raw);
          if (s && s.projects && s.projects.length) return s;
        }
      } catch {}
      return initialState();
    }

    function saveState(s) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) { console.warn('persist failed', e); }
    }

    function initialState() {
      const projectId = uid();
      const docId = uid();
      const dsId = uid();
      return {
        projects: [{
          id: projectId,
          name: 'Default project',
          createdAt: now(),
          documents: [{
            id: docId,
            title: 'Welcome',
            content: '# Welcome to your harness\n\nThis is a **working document** — markdown on the left, rendered on the right. Claude will eventually propose edits here as accept/reject diffs.\n\n## What lives here\n\n- **Documents** (this) — long-form prose, briefs, frameworks\n- **Datasets** — structured rows (decisions, projects, contacts)\n- **Memory** — facts about you, project state, reference library\n- **Sessions** — every chat saved & searchable\n- **Skills** — Claude\'s instructions, with three update modes\n\n## Next\n\nClick around. Backend is stubbed; chat replies are echoes. Once you tell me your Supabase + Anthropic creds are ready, I\'ll wire the live calls.',
            createdAt: now(),
            updatedAt: now(),
            versions: [],
          }],
          datasets: [{
            id: dsId,
            name: 'Decisions',
            schema: [
              { id: uid(), name: 'decision', type: 'text' },
              { id: uid(), name: 'status', type: 'select', options: ['open', 'committed', 'rejected', 'revisit'] },
              { id: uid(), name: 'rationale', type: 'longtext' },
              { id: uid(), name: 'date', type: 'date' },
            ],
            rows: [
              { id: uid(), decision: 'Use Anthropic API + Supabase Edge Function proxy', status: 'committed', rationale: 'Custom UI requires direct API; key must not live in browser.', date: new Date().toISOString().slice(0,10) },
              { id: uid(), decision: 'Defer skills learning loop to v2', status: 'committed', rationale: 'MVP first — get docs/memory/chat usable before learning loop.', date: new Date().toISOString().slice(0,10) },
            ],
          }],
          memoryFacts: [
            { id: uid(), bucket: 'about_me', content: 'I prefer concise responses with concrete recommendations, not options-lists.', createdAt: now() },
            { id: uid(), bucket: 'about_me', content: 'Primary work: research, planning, strategy. Daily Claude user.', createdAt: now() },
            { id: uid(), bucket: 'project', content: 'Goal: replace Claude Desktop with a bespoke harness that solves context loss, stale skills, no session log.', createdAt: now() },
          ],
          sessions: [],
          skills: [
            { id: uid(), name: 'Response style', mode: 'force_inject', body: 'Be concise. Lead with the recommendation. Give the tradeoff in one sentence. Skip options-lists unless I ask.', updatedAt: now() },
          ],
        }],
        currentProjectId: projectId,
        currentSessionId: null,
        view: 'chat',
        selectedDocId: null,
        selectedDatasetId: null,
        selectedSkillId: null,
        ui: { sidebarOpen: true, model: 'claude-sonnet-4-6', mobileTab: 'chat' },
        config: { anthropicKeyConfigured: false, supabaseConfigured: false },
      };
    }

    // =====================================================================
    // STUB CLAUDE CALL  (replaced when backend wired)
    // =====================================================================
    async function callClaudeStub(messages, opts = {}) {
      const last = messages[messages.length - 1];
      const text = last && last.content ? last.content : '';
      await new Promise(r => setTimeout(r, 400 + Math.random() * 400));
      return {
        role: 'assistant',
        content: `_(scaffold mode — no API wired yet)_\n\nI'd respond to: "${text.slice(0, 240)}${text.length > 240 ? '…' : ''}"\n\nOnce you wire the Anthropic API, this will be a real response with your memory + skills injected. The chat shell, persistence, session log, and document/dataset/memory CRUD are all already live — feel free to click around.`,
        ts: now(),
        model: opts.model || 'stub',
      };
    }

    // =====================================================================
    // ROOT APP
    // =====================================================================
    function App() {
      const [state, setState] = useState(loadState);
      const [isMobile, setIsMobile] = useState(typeof window !== 'undefined' && window.innerWidth < 768);

      useEffect(() => { saveState(state); }, [state]);

      useEffect(() => {
        const onResize = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);

      const project = state.projects.find(p => p.id === state.currentProjectId) || state.projects[0];

      const setView = (view) => setState(s => ({ ...s, view, ui: { ...s.ui, sidebarOpen: !isMobile } }));

      const updateProject = (updater) => setState(s => ({
        ...s,
        projects: s.projects.map(p => p.id === s.currentProjectId ? updater(p) : p),
      }));

      const setModel = (model) => setState(s => ({ ...s, ui: { ...s.ui, model } }));
      const setCurrentSession = (id) => setState(s => ({ ...s, currentSessionId: id }));
      const setSelectedDoc = (id) => setState(s => ({ ...s, selectedDocId: id }));
      const setSelectedDataset = (id) => setState(s => ({ ...s, selectedDatasetId: id }));
      const setSelectedSkill = (id) => setState(s => ({ ...s, selectedSkillId: id }));

      if (isMobile) {
        return <MobileApp state={state} setState={setState} project={project} updateProject={updateProject} setView={setView} setModel={setModel} setCurrentSession={setCurrentSession} setSelectedDoc={setSelectedDoc} setSelectedDataset={setSelectedDataset} setSelectedSkill={setSelectedSkill} />;
      }

      return <DesktopApp state={state} setState={setState} project={project} updateProject={updateProject} setView={setView} setModel={setModel} setCurrentSession={setCurrentSession} setSelectedDoc={setSelectedDoc} setSelectedDataset={setSelectedDataset} setSelectedSkill={setSelectedSkill} />;
    }

    // =====================================================================
    // DESKTOP LAYOUT
    // =====================================================================
    function DesktopApp(props) {
      const { state, setState, project, updateProject, setView } = props;

      return (
        <div className="h-screen flex flex-col bg-slate-950 text-slate-100">
          <TopBar {...props} />
          <div className="flex-1 flex overflow-hidden">
            <Sidebar {...props} />
            <main className="flex-1 overflow-hidden">
              <ViewRouter {...props} />
            </main>
          </div>
        </div>
      );
    }

    // =====================================================================
    // MOBILE LAYOUT
    // =====================================================================
    function MobileApp(props) {
      const { state, setState, project, updateProject, setView } = props;
      const view = state.view;

      return (
        <div className="h-screen flex flex-col bg-slate-950 text-slate-100">
          <MobileTopBar {...props} />
          <main className="flex-1 overflow-hidden">
            <ViewRouter {...props} mobile />
          </main>
          <MobileBottomNav {...props} />
        </div>
      );
    }

    // =====================================================================
    // TOP BAR (DESKTOP)
    // =====================================================================
    function TopBar(props) {
      const { state, setState, project, setView, setModel } = props;
      const [projectMenuOpen, setProjectMenuOpen] = useState(false);
      const [modelMenuOpen, setModelMenuOpen] = useState(false);

      const model = MODELS.find(m => m.id === state.ui.model) || MODELS[0];

      const switchProject = (id) => { setState(s => ({ ...s, currentProjectId: id })); setProjectMenuOpen(false); };
      const newProject = () => {
        const name = prompt('Project name?');
        if (!name) return;
        const id = uid();
        setState(s => ({
          ...s,
          projects: [...s.projects, { id, name, createdAt: now(), documents: [], datasets: [], memoryFacts: [], sessions: [], skills: [] }],
          currentProjectId: id,
        }));
        setProjectMenuOpen(false);
      };

      return (
        <header className="h-14 border-b border-slate-800 flex items-center px-4 gap-3 shrink-0">
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center text-white">
              <Icon name="spark" className="w-4 h-4" />
            </div>
            <span className="font-semibold tracking-tight">Harness</span>
          </div>

          <div className="relative">
            <button onClick={() => setProjectMenuOpen(v => !v)} className="ml-2 flex items-center gap-1.5 px-3 py-1.5 rounded-lg hover:bg-slate-800 text-sm">
              <Icon name="folder" className="w-4 h-4 text-slate-400" />
              <span>{project.name}</span>
              <Icon name="chevronDown" className="w-3.5 h-3.5 text-slate-500" />
            </button>
            {projectMenuOpen && (
              <div className="absolute top-full left-0 mt-1 w-64 bg-slate-900 border border-slate-700 rounded-lg shadow-xl z-30 p-1">
                {state.projects.map(p => (
                  <button key={p.id} onClick={() => switchProject(p.id)} className={`w-full text-left px-3 py-2 text-sm rounded-md flex items-center justify-between hover:bg-slate-800 ${p.id === project.id ? 'text-violet-300' : ''}`}>
                    <span>{p.name}</span>
                    {p.id === project.id && <Icon name="check" className="w-4 h-4" />}
                  </button>
                ))}
                <div className="border-t border-slate-800 mt-1 pt-1">
                  <button onClick={newProject} className="w-full text-left px-3 py-2 text-sm rounded-md flex items-center gap-2 hover:bg-slate-800 text-slate-400">
                    <Icon name="plus" className="w-4 h-4" />
                    New project
                  </button>
                </div>
              </div>
            )}
          </div>

          <div className="flex-1" />

          <div className="relative">
            <button onClick={() => setModelMenuOpen(v => !v)} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg hover:bg-slate-800 text-sm">
              <span className="text-slate-400 text-xs">model</span>
              <span>{model.name}</span>
              <Icon name="chevronDown" className="w-3.5 h-3.5 text-slate-500" />
            </button>

    // =====================================================================
    // CHAT VIEW
    // =====================================================================
    function ChatView(props) {
      const { state, setState, project, updateProject, mobile } = props;
      const [input, setInput] = useState('');
      const [pending, setPending] = useState(false);
      const messagesEndRef = useRef(null);
      const textareaRef = useRef(null);

      // Find current session, or null
      const session = state.currentSessionId
        ? project.sessions.find(s => s.id === state.currentSessionId)
        : null;
      const messages = session ? session.messages : [];

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages.length, pending]);

      const startNewSession = () => {
        const id = uid();
        const newSess = { id, startedAt: now(), model: state.ui.model, title: null, messages: [] };
        updateProject(p => ({ ...p, sessions: [newSess, ...p.sessions] }));
        setState(s => ({ ...s, currentSessionId: id }));
        return id;
      };

      const send = async () => {
        const text = input.trim();
        if (!text || pending) return;
        setInput('');

        let sessId = state.currentSessionId;
        if (!sessId) sessId = startNewSession();

        const userMsg = { role: 'user', content: text, ts: now() };

        // Append user message
        updateProject(p => ({
          ...p,
          sessions: p.sessions.map(s => s.id === sessId
            ? { ...s, messages: [...s.messages, userMsg], title: s.title || text.slice(0, 60) }
            : s),
        }));

        setPending(true);
        try {
          // Gather context for the call (will use this when wired)
          const sessNow = (project.sessions.find(s => s.id === sessId) || { messages: [] });
          const fullMessages = [...sessNow.messages, userMsg];
          const reply = await callClaudeStub(fullMessages, { model: state.ui.model });
          updateProject(p => ({
            ...p,
            sessions: p.sessions.map(s => s.id === sessId
              ? { ...s, messages: [...s.messages, reply] }
              : s),
          }));
        } catch (e) {
          updateProject(p => ({
            ...p,
            sessions: p.sessions.map(s => s.id === sessId
              ? { ...s, messages: [...s.messages, { role: 'assistant', content: `Error: ${e.message}`, ts: now(), error: true }] }
              : s),
          }));
        } finally {
          setPending(false);
        }
      };

      const onKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      };

      const autoResize = (el) => {
        if (!el) return;
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 240) + 'px';
      };

      return (
        <div className="h-full flex flex-col">
          {/* Header */}
          <div className="border-b border-slate-800 px-4 py-2.5 flex items-center gap-2 shrink-0">
            <div className="text-sm font-medium">
              {session ? (session.title || 'Untitled session') : 'New session'}
            </div>
            <span className="flex-1" />
            <button onClick={() => setState(s => ({ ...s, currentSessionId: null }))} className="text-xs px-2.5 py-1 rounded-md hover:bg-slate-800 text-slate-400">
              + New
            </button>
          </div>

          {/* Messages */}
          <div className="flex-1 overflow-y-auto scrollbar-thin">
            <div className="max-w-3xl mx-auto px-4 py-6 space-y-5">
              {messages.length === 0 && (
                <div className="text-center text-slate-500 py-12">
                  <Icon name="chat" className="w-8 h-8 mx-auto mb-3 opacity-40" />
                  <p className="text-sm">Start typing to begin a session.</p>
                  <p className="text-xs mt-1 text-slate-600">Memory, skills, and project state will be injected once the backend is wired.</p>
                </div>
              )}
              {messages.map((m, i) => <MessageBubble key={i} message={m} />)}
              {pending && (
                <div className="flex items-start gap-3">
                  <div className="w-7 h-7 rounded-full bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center text-white shrink-0">
                    <Icon name="spark" className="w-3.5 h-3.5" />
                  </div>
                  <div className="flex gap-1 pt-2.5">
                    <span className="dot w-1.5 h-1.5 rounded-full bg-slate-400"></span>
                    <span className="dot w-1.5 h-1.5 rounded-full bg-slate-400"></span>
                    <span className="dot w-1.5 h-1.5 rounded-full bg-slate-400"></span>
                  </div>
                </div>
              )}
              <div ref={messagesEndRef} />
            </div>
          </div>

          {/* Composer */}
          <div className="border-t border-slate-800 p-3 shrink-0">
            <div className="max-w-3xl mx-auto">
              <div className="flex gap-2 items-end bg-slate-900 border border-slate-700 rounded-xl p-2 focus-within:border-violet-500/50">
                <textarea
                  ref={textareaRef}
                  value={input}
                  onChange={(e) => { setInput(e.target.value); autoResize(e.target); }}
                  onKeyDown={onKeyDown}
                  placeholder="Type a message... (Enter to send, Shift+Enter for newline)"
                  rows={1}
                  className="flex-1 bg-transparent resize-none focus:outline-none text-sm py-1.5 px-2 max-h-60"
                />
                <button onClick={send} disabled={!input.trim() || pending} className="p-2 rounded-lg bg-violet-600 hover:bg-violet-500 disabled:bg-slate-700 disabled:text-slate-500 text-white shrink-0">
                  <Icon name="send" className="w-4 h-4" />
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function MessageBubble({ message }) {
      const isUser = message.role === 'user';
      const html = useMemo(() => {
        if (typeof window === 'undefined' || !window.marked) return null;
        try {
          window.marked.setOptions({ breaks: true });
          return { __html: window.marked.parse(message.content || '') };
        } catch { return null; }
      }, [message.content]);

      if (isUser) {
        return (
          <div className="flex items-start gap-3 justify-end">
            <div className="bg-violet-600/15 border border-violet-500/20 rounded-2xl rounded-tr-md px-4 py-2.5 max-w-[80%]">
              <div className="text-sm whitespace-pre-wrap">{message.content}</div>
            </div>
          </div>
        );
      }
      return (
        <div className="flex items-start gap-3">
          <div className="w-7 h-7 rounded-full bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center text-white shrink-0">
            <Icon name="spark" className="w-3.5 h-3.5" />
          </div>
          <div className="flex-1 min-w-0">
            {html
              ? <div className="prose-invert text-sm" dangerouslySetInnerHTML={html} />
              : <div className="text-sm whitespace-pre-wrap">{message.content}</div>}
          </div>
        </div>
      );
    }

    function DocumentsView(props) {

        updateProject(p => ({
          ...p,
          documents: p.documents.map(d => d.id === id ? { ...d, ...patch, updatedAt: now() } : d),

        updateProject(p => ({ ...p, documents: p.documents.filter(d => d.id !== id) }));

      return (

                  Create your first document

      );

          window.marked.setOptions({ breaks: true });

      return (

                { id: 'edit', icon: 'edit', label: 'Edit' },
                { id: 'split', icon: 'menu', label: 'Split' },
                { id: 'preview', icon: 'eye', label: 'Preview' },
              ].map(m => (
                <button key={m.id} onClick={() => setMode(m.id)} className={`px-2 py-1 text-xs rounded ${mode === m.id ? 'bg-slate-700 text-slate-100' : 'text-slate-400 hover:text-slate-200'}`} title={m.label}>
                  <Icon name={m.icon} className="w-3.5 h-3.5" />
                </button>
              ))}
            </div>
            <button onClick={onDelete} className="p-1.5 rounded hover:bg-slate-800 text-slate-500 hover:text-red-400" title="Delete">
              <Icon name="trash" className="w-4 h-4" />
            </button>
          </div>

          {/* Body */}
          <div className="flex-1 flex overflow-hidden">
            {(mode === 'edit' || mode === 'split') && (
              <textarea
                value={doc.content}
                onChange={(e) => onChange({ content: e.target.value })}
                className={`${mode === 'split' ? 'w-1/2 border-r border-slate-800' : 'flex-1'} bg-slate-950 p-4 text-sm leading-relaxed focus:outline-none resize-none scrollbar-thin font-mono`}

    function DatasetGrid({ dataset, onChange, onDelete }) {
      const [schemaOpen, setSchemaOpen] = useState(false);
      const [editingCell, setEditingCell] = useState(null); // { rowId, field }

      const addRow = () => {
        const row = { id: uid() };
        dataset.schema.forEach(f => { row[f.name] = f.type === 'multiselect' ? [] : (f.type === 'boolean' ? false : ''); });
        onChange(d => ({ ...d, rows: [...d.rows, row] }));
      };

      const deleteRow = (rowId) => {
        onChange(d => ({ ...d, rows: d.rows.filter(r => r.id !== rowId) }));
      };

      const setCell = (rowId, fieldName, value) => {
        onChange(d => ({
          ...d,
          rows: d.rows.map(r => r.id === rowId ? { ...r, [fieldName]: value } : r),
        }));
      };

      return (
        <div className="flex-1 flex flex-col min-w-0">
          <div className="border-b border-slate-800 px-4 py-2.5 flex items-center gap-2 shrink-0">

              value={dataset.name}

              <Icon name="trash" className="w-4 h-4" />
            </button>
          </div>

          <div className="flex-1 overflow-auto scrollbar-thin">
            <table className="w-full text-sm">
              <thead className="sticky top-0 bg-slate-900 z-10">
                <tr>
                  {dataset.schema.map(f => (
                    <th key={f.id} className="text-left px-3 py-2 text-xs uppercase tracking-wide text-slate-500 font-medium border-b border-slate-800 whitespace-nowrap">

                  <tr key={row.id} className="hover:bg-slate-900/40 group">
                    {dataset.schema.map(f => (
                      <td key={f.id} className="border-b border-slate-800/60 align-top">
                        <DatasetCell
                          field={f}
                          value={row[f.name]}
                          onChange={(v) => setCell(row.id, f.name, v)}
                          editing={editingCell && editingCell.rowId === row.id && editingCell.field === f.name}
                          onEdit={() => setEditingCell({ rowId: row.id, field: f.name })}
                          onBlur={() => setEditingCell(null)}
                        />
                      </td>
                    ))}
                    <td className="border-b border-slate-800/60 align-middle px-2">
                      <button onClick={() => deleteRow(row.id)} className="opacity-0 group-hover:opacity-100 p-1 rounded hover:bg-slate-800 text-slate-500 hover:text-red-400">
                        <Icon name="trash" className="w-3.5 h-3.5" />
                      </button>
                    </td>
                  </tr>
                ))}
                {dataset.rows.length === 0 && (
                  <tr><td colSpan={dataset.schema.length + 1} className="text-center text-slate-500 py-8 text-sm">No rows. Click "Add row" to start.</td></tr>
                )}
              </tbody>
            </table>
          </div>

          {schemaOpen && (
            <SchemaEditor dataset={dataset} onChange={onChange} onClose={() => setSchemaOpen(false)} />
          )}
        </div>
      );
    }

    function DatasetCell({ field, value, onChange, editing, onEdit, onBlur }) {
      const display = (v) => {
        if (v === undefined || v === null || v === '') return <span className="text-slate-600">—</span>;
        if (field.type === 'multiselect') return (Array.isArray(v) ? v : []).join(', ');
        if (field.type === 'boolean') return v ? '✓' : '';
        return String(v);
      };

      if (field.type === 'select' && editing) {
        return (
          <select autoFocus value={value || ''} onChange={(e) => { onChange(e.target.value); onBlur(); }} onBlur={onBlur} className="w-full bg-slate-900 border border-violet-500/50 px-2 py-1 text-sm focus:outline-none">
            <option value="">—</option>
            {(field.options || []).map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        );
      }

      if (field.type === 'longtext' && editing) {
        return (
          <textarea autoFocus value={value || ''} onChange={(e) => onChange(e.target.value)} onBlur={onBlur} rows={3} className="w-full bg-slate-900 border border-violet-500/50 px-2 py-1 text-sm focus:outline-none resize-none scrollbar-thin" />
        );
      }

      if (field.type === 'boolean') {
        return (
          <div className="px-3 py-2">
            <input type="checkbox" checked={!!value} onChange={(e) => onChange(e.target.checked)} className="accent-violet-500" />
          </div>
        );
      }

      if (editing) {
        const type = field.type === 'number' ? 'number' : field.type === 'date' ? 'date' : 'text';
        return (
          <input autoFocus type={type} value={value || ''} onChange={(e) => onChange(field.type === 'number' ? Number(e.target.value) : e.target.value)} onBlur={onBlur} onKeyDown={(e) => { if (e.key === 'Enter') onBlur(); }} className="w-full bg-slate-900 border border-violet-500/50 px-2 py-1 text-sm focus:outline-none" />
        );
      }

      // Pill display for select/multiselect
      if (field.type === 'select' && value) {
        return (
          <div onClick={onEdit} className="px-3 py-2 cursor-pointer">
            <span className="text-xs px-2 py-0.5 rounded-full bg-violet-600/15 text-violet-300 border border-violet-500/20">{value}</span>
          </div>
        );
      }

      return (
        <div onClick={onEdit} className="px-3 py-2 cursor-pointer text-slate-200 min-h-[2.4rem] whitespace-pre-wrap break-words">
          {display(value)}
        </div>
      );
    }

    function SchemaEditor({ dataset, onChange, onClose }) {
      const [fields, setFields] = useState(dataset.schema);
      const [optionsText, setOptionsText] = useState({});

      useEffect(() => {
        const m = {};
        fields.forEach(f => { if (f.options) m[f.id] = f.options.join(', '); });
        setOptionsText(m);
      }, []);

      const addField = () => setFields(fs => [...fs, { id: uid(), name: 'new_field', type: 'text' }]);
      const removeField = (id) => setFields(fs => fs.filter(f => f.id !== id));
      const updateField = (id, patch) => setFields(fs => fs.map(f => f.id === id ? { ...f, ...patch } : f));

      const save = () => {
        // Apply options text
        const finalFields = fields.map(f => {
          if (f.type === 'select' || f.type === 'multiselect') {
            const txt = optionsText[f.id] || '';
            return { ...f, options: txt.split(',').map(s => s.trim()).filter(Boolean) };
          }
          return f;
        });
        onChange(d => ({ ...d, schema: finalFields }));
        onClose();
      };

      return (
        <div className="absolute inset-0 bg-slate-950/80 z-40 flex items-center justify-center p-4">
          <div className="bg-slate-900 border border-slate-700 rounded-xl w-full max-w-xl max-h-[80vh] flex flex-col">
            <div className="px-4 py-3 border-b border-slate-800 flex items-center">
              <span className="font-medium text-sm">Edit fields — {dataset.name}</span>
              <span className="flex-1" />
              <button onClick={onClose} className="p-1 rounded hover:bg-slate-800"><Icon name="x" className="w-4 h-4" /></button>
            </div>
            <div className="flex-1 overflow-y-auto scrollbar-thin p-3 space-y-2">
              {fields.map(f => (
                <div key={f.id} className="border border-slate-800 rounded-lg p-3 space-y-2">
                  <div className="flex items-center gap-2">
                    <input value={f.name} onChange={(e) => updateField(f.id, { name: e.target.value })} className="flex-1 bg-slate-950 border border-slate-700 rounded px-2 py-1 text-sm focus:outline-none focus:border-violet-500" />
                    <select value={f.type} onChange={(e) => updateField(f.id, { type: e.target.value })} className="bg-slate-950 border border-slate-700 rounded px-2 py-1 text-sm focus:outline-none focus:border-violet-500">
                      {FIELD_TYPES.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                    </select>
                    <button onClick={() => removeField(f.id)} className="p-1.5 rounded hover:bg-slate-800 text-slate-500 hover:text-red-400">
                      <Icon name="trash" className="w-4 h-4" />
                    </button>
                  </div>
                  {(f.type === 'select' || f.type === 'multiselect') && (
                    <input
                      value={optionsText[f.id] || ''}
                      onChange={(e) => setOptionsText(o => ({ ...o, [f.id]: e.target.value }))}
                      placeholder="Options, comma-separated"
                      className="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1 text-xs focus:outline-none focus:border-violet-500"
                    />
                  )}
                </div>
              ))}
              <button onClick={addField} className="w-full border border-dashed border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-400 hover:text-slate-200 hover:border-slate-600 flex items-center justify-center gap-1">
                <Icon name="plus" className="w-4 h-4" /> Add field
              </button>
            </div>
            <div className="px-4 py-3 border-t border-slate-800 flex justify-end gap-2">
              <button onClick={onClose} className="px-3 py-1.5 text-sm rounded-md hover:bg-slate-800 text-slate-300">Cancel</button>
              <button onClick={save} className="px-3 py-1.5 text-sm rounded-md bg-violet-600 hover:bg-violet-500 text-white">Save</button>
            </div>
          </div>
        </div>
      );
    }

    // =====================================================================
    // MEMORY VIEW
    // =====================================================================
    function MemoryView(props) {
      const { project, updateProject } = props;
      const [draft, setDraft] = useState({});

      const addFact = (bucket) => {
        const content = (draft[bucket] || '').trim();
        if (!content) return;
        const fact = { id: uid(), bucket, content, createdAt: now() };
        updateProject(p => ({ ...p, memoryFacts: [fact, ...p.memoryFacts] }));
        setDraft(d => ({ ...d, [bucket]: '' }));
      };

      const updateFact = (id, content) => {
        updateProject(p => ({
          ...p,
          memoryFacts: p.memoryFacts.map(f => f.id === id ? { ...f, content, updatedAt: now() } : f),
        }));
      };

      const deleteFact = (id) => {
        updateProject(p => ({ ...p, memoryFacts: p.memoryFacts.filter(f => f.id !== id) }));
      };

      return (
        <div className="h-full overflow-y-auto scrollbar-thin">
          <div className="max-w-3xl mx-auto p-6 space-y-6">
            <header className="mb-2">
              <h1 className="text-xl font-semibold">Memory</h1>
              <p className="text-sm text-slate-400 mt-1">Facts Claude can read. Force-injected when relevant.</p>
            </header>

            {MEMORY_BUCKETS.map(bucket => {
              const facts = project.memoryFacts.filter(f => f.bucket === bucket.id);
              return (
                <section key={bucket.id} className="bg-slate-900/40 border border-slate-800 rounded-xl p-4">
                  <div className="flex items-baseline justify-between mb-3">
                    <div>
                      <h2 className="font-medium">{bucket.name}</h2>
                      <p className="text-xs text-slate-500">{bucket.desc}</p>
                    </div>
                    <span className="text-xs text-slate-500">{facts.length}</span>
                  </div>

                  <div className="flex gap-2 mb-3">
                    <input
                      value={draft[bucket.id] || ''}
                      onChange={(e) => setDraft(d => ({ ...d, [bucket.id]: e.target.value }))}
                      onKeyDown={(e) => { if (e.key === 'Enter') addFact(bucket.id); }}
                      placeholder="Add a fact..."
                      className="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-violet-500"
                    />
                    <button onClick={() => addFact(bucket.id)} className="px-3 py-1.5 rounded-lg bg-violet-600 hover:bg-violet-500 text-sm text-white">Add</button>
                  </div>

                  <div className="space-y-1.5">
                    {facts.map(f => (
                      <FactRow key={f.id} fact={f} onSave={(c) => updateFact(f.id, c)} onDelete={() => deleteFact(f.id)} />
                    ))}
                    {facts.length === 0 && <div className="text-xs text-slate-500 italic">No facts yet.</div>}
                  </div>
                </section>
              );
            })}
          </div>
        </div>
      );
    }

    function FactRow({ fact, onSave, onDelete }) {
      const [editing, setEditing] = useState(false);
      const [text, setText] = useState(fact.content);

      const save = () => {
        if (text.trim() && text !== fact.content) onSave(text.trim());
        setEditing(false);
      };

      if (editing) {
        return (
          <div className="flex gap-2">
            <textarea value={text} onChange={(e) => setText(e.target.value)} onBlur={save} autoFocus rows={2} className="flex-1 bg-slate-950 border border-violet-500/50 rounded-lg px-3 py-1.5 text-sm focus:outline-none resize-none" />
          </div>
        );
      }

      return (
        <div className="group flex items-start gap-2 p-2 rounded-lg hover:bg-slate-900/60">
          <div className="flex-1 text-sm text-slate-200 leading-relaxed cursor-text" onClick={() => setEditing(true)}>{fact.content}</div>
          <button onClick={onDelete} className="opacity-0 group-hover:opacity-100 p-1 rounded hover:bg-slate-800 text-slate-500 hover:text-red-400">
            <Icon name="trash" className="w-3.5 h-3.5" />
          </button>
        </div>
      );
    }

    // =====================================================================
    // SESSIONS VIEW
    // =====================================================================
    function SessionsView(props) {
      const { state, setState, project, updateProject } = props;
      const [query, setQuery] = useState('');

      const filtered = project.sessions.filter(s => {
        if (!query.trim()) return true;
        const q = query.toLowerCase();
        if ((s.title || '').toLowerCase().includes(q)) return true;
        return s.messages.some(m => (m.content || '').toLowerCase().includes(q));
      });

      const openSession = (id) => setState(s => ({ ...s, currentSessionId: id, view: 'chat' }));

      const deleteSession = (id) => {
        if (!confirm('Delete this session?')) return;
        updateProject(p => ({ ...p, sessions: p.sessions.filter(s => s.id !== id) }));
      };

      return (
        <div className="h-full flex flex-col">
          <div className="border-b border-slate-800 p-3 flex items-center gap-2 shrink-0">
            <div className="flex items-center gap-2 flex-1 max-w-md bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5">
              <Icon name="search" className="w-4 h-4 text-slate-500" />
              <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search sessions..." className="flex-1 bg-transparent text-sm focus:outline-none" />
            </div>
          </div>
          <div className="flex-1 overflow-y-auto scrollbar-thin">
            <div className="max-w-3xl mx-auto p-4 space-y-2">
              {filtered.length === 0 && (
                <div className="text-center text-slate-500 py-10 text-sm">
                  {project.sessions.length === 0 ? 'No sessions yet. Go start one in Chat.' : 'No matches.'}
                </div>
              )}
              {filtered.map(s => (
                <div key={s.id} className="bg-slate-900/40 border border-slate-800 rounded-lg p-3 hover:border-slate-700 group">
                  <div className="flex items-baseline gap-2">
                    <button onClick={() => openSession(s.id)} className="font-medium text-sm hover:text-violet-300 text-left flex-1 truncate">
                      {s.title || 'Untitled'}
                    </button>
                    <span className="text-xs text-slate-500 shrink-0">{fmtDate(s.startedAt)}</span>
                    <button onClick={() => deleteSession(s.id)} className="opacity-0 group-hover:opacity-100 p-1 rounded hover:bg-slate-800 text-slate-500 hover:text-red-400">
                      <Icon name="trash" className="w-3.5 h-3.5" />
                    </button>
                  </div>
                  <div className="text-xs text-slate-500 mt-1">
                    {s.messages.length} message{s.messages.length === 1 ? '' : 's'} · {s.model}
                  </div>
                  {s.messages[0] && (
                    <div className="text-xs text-slate-400 mt-2 line-clamp-2">{(s.messages[0].content || '').slice(0, 200)}</div>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // =====================================================================
    // SKILLS VIEW
    // =====================================================================
    function SkillsView(props) {
      const { state, setState, project, updateProject } = props;
      const skills = project.skills;
      const selectedId = state.selectedSkillId || skills[0]?.id;
      const skill = skills.find(s => s.id === selectedId);

      const newSkill = () => {
        const id = uid();
        const s = { id, name: 'Untitled skill', mode: 'manual', body: '', updatedAt: now() };
        updateProject(p => ({ ...p, skills: [s, ...p.skills] }));
        setState(s2 => ({ ...s2, selectedSkillId: id }));
      };

      const updateSkill = (id, patch) => {
        updateProject(p => ({
          ...p,
          skills: p.skills.map(s => s.id === id ? { ...s, ...patch, updatedAt: now() } : s),
        }));
      };

      const deleteSkill = (id) => {
        if (!confirm('Delete this skill?')) return;
        updateProject(p => ({ ...p, skills: p.skills.filter(s => s.id !== id) }));
        setState(s2 => ({ ...s2, selectedSkillId: null }));
      };

      return (
        <div className="h-full flex">
          <div className="w-64 border-r border-slate-800 flex flex-col shrink-0">
            <div className="p-3 flex items-center gap-2 border-b border-slate-800">
              <span className="text-xs uppercase tracking-wide text-slate-500 font-medium">Skills</span>
              <span className="flex-1" />
              <button onClick={newSkill} className="p-1 rounded hover:bg-slate-800 text-slate-400"><Icon name="plus" className="w-4 h-4" /></button>
            </div>
            <div className="flex-1 overflow-y-auto scrollbar-thin p-2 space-y-0.5">
              {skills.length === 0 && <div className="text-xs text-slate-500 p-4 text-center">No skills yet</div>}
              {skills.map(s => (
                <button key={s.id} onClick={() => setState(st => ({ ...st, selectedSkillId: s.id }))} className={`w-full text-left px-2.5 py-2 rounded-md text-sm ${s.id === selectedId ? 'bg-slate-800' : 'text-slate-400 hover:bg-slate-800/50'}`}>
                  <div className="truncate">{s.name}</div>
                  <div className="text-xs text-slate-500">{SKILL_MODES.find(m => m.id === s.mode)?.name}</div>
                </button>
              ))}
            </div>
          </div>

          {skill ? (
            <SkillEditor skill={skill} onChange={(patch) => updateSkill(skill.id, patch)} onDelete={() => deleteSkill(skill.id)} />
          ) : (
            <div className="flex-1 flex items-center justify-center text-slate-500">
              <div className="text-center">
                <Icon name="spark" className="w-10 h-10 mx-auto mb-3 opacity-30" />
                <p className="text-sm mb-3">No skill selected.</p>
                <button onClick={newSkill} className="px-4 py-2 rounded-lg bg-violet-600 hover:bg-violet-500 text-sm text-white">Create skill</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function SkillEditor({ skill, onChange, onDelete }) {
      return (
        <div className="flex-1 flex flex-col min-w-0">
          <div className="border-b border-slate-800 px-4 py-2.5 flex items-center gap-2 shrink-0">
            <input value={skill.name} onChange={(e) => onChange({ name: e.target.value })} className="bg-transparent text-sm font-medium focus:outline-none focus-ring rounded px-1 flex-1 min-w-0" />
            <button onClick={onDelete} className="p-1.5 rounded hover:bg-slate-800 text-slate-500 hover:text-red-400">
              <Icon name="trash" className="w-4 h-4" />
            </button>
          </div>

          <div className="p-4 border-b border-slate-800 shrink-0">
            <div className="text-xs uppercase tracking-wide text-slate-500 mb-2">Update mode</div>
            <div className="flex gap-2 flex-wrap">
              {SKILL_MODES.map(m => (
                <button key={m.id} onClick={() => onChange({ mode: m.id })} className={`px-3 py-2 rounded-lg text-left text-xs border ${skill.mode === m.id ? 'border-violet-500 bg-violet-600/10 text-violet-200' : 'border-slate-700 text-slate-400 hover:border-slate-600'}`}>
                  <div className="font-medium">{m.name}</div>
                  <div className="text-slate-500 mt-0.5">{m.desc}</div>
                </button>
              ))}
            </div>
            <div className="text-xs text-slate-500 mt-3 italic">v2: Claude will be able to propose / apply updates here. For now, edit manually.</div>
          </div>

          <textarea value={skill.body} onChange={(e) => onChange({ body: e.target.value })} placeholder="Write the skill content..." className="flex-1 bg-slate-950 p-4 text-sm leading-relaxed focus:outline-none resize-none scrollbar-thin font-mono" style={{ fontFamily: 'ui-monospace, SFMono-Regular, monospace' }} />

          <div className="border-t border-slate-800 px-4 py-1.5 text-xs text-slate-500 shrink-0">
            updated {fmtDate(skill.updatedAt)} · {(skill.body || '').length} chars
          </div>
        </div>
      );
    }

    // =====================================================================
    // SETTINGS VIEW
    // =====================================================================
    function SettingsView(props) {
      const { state, setState } = props;
      return (
        <div className="h-full overflow-y-auto scrollbar-thin">
          <div className="max-w-2xl mx-auto p-6 space-y-6">
            <header>
              <h1 className="text-xl font-semibold">Settings</h1>
              <p className="text-sm text-slate-400 mt-1">Configure backend wiring, manage projects, view storage.</p>
            </header>

            <section className="bg-slate-900/40 border border-slate-800 rounded-xl p-4">
              <h2 className="font-medium mb-1">Backend status</h2>
              <p className="text-xs text-slate-500 mb-3">v1 scaffold uses localStorage. Live wiring comes next.</p>
              <div className="space-y-2 text-sm">
                <Status label="Supabase" ok={state.config.supabaseConfigured} note="paste URL + anon key to wire" />
                <Status label="Anthropic API" ok={state.config.anthropicKeyConfigured} note="key stored as Supabase Edge Function secret" />
                <Status label="Prompt caching" ok={false} note="enabled with API wiring" />
                <Status label="Session embeddings" ok={false} note="v2" />
              </div>
            </section>

            <section className="bg-slate-900/40 border border-slate-800 rounded-xl p-4">
              <h2 className="font-medium mb-1">Projects</h2>
              <p className="text-xs text-slate-500 mb-3">Each project has its own documents, datasets, memory, sessions, skills.</p>
              <div className="space-y-2">
                {state.projects.map(p => (
                  <div key={p.id} className="flex items-center gap-2 text-sm">
                    <div className="flex-1">
                      <div>{p.name}</div>
                      <div className="text-xs text-slate-500">{p.documents.length} docs · {p.datasets.length} datasets · {p.memoryFacts.length} facts · {p.sessions.length} sessions</div>
                    </div>
                    {state.projects.length > 1 && (
                      <button onClick={() => {
                        if (!confirm(`Delete project "${p.name}" and everything in it?`)) return;
                        setState(s => ({
                          ...s,
                          projects: s.projects.filter(x => x.id !== p.id),
                          currentProjectId: s.currentProjectId === p.id ? s.projects.find(x => x.id !== p.id).id : s.currentProjectId,
                        }));
                      }} className="p-1.5 rounded hover:bg-slate-800 text-slate-500 hover:text-red-400">
                        <Icon name="trash" className="w-4 h-4" />
                      </button>
                    )}
                  </div>
                ))}
              </div>
            </section>

            <section className="bg-slate-900/40 border border-slate-800 rounded-xl p-4">
              <h2 className="font-medium mb-1">Local data</h2>
              <p className="text-xs text-slate-500 mb-3">v1 stores everything in your browser localStorage. Export / import below; once Supabase is wired, this is automatic.</p>
              <div className="flex gap-2">
                <button
                  onClick={() => {
                    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `harness-export-${new Date().toISOString().slice(0,10)}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                  }}
                  className="px-3 py-1.5 rounded-md bg-slate-800 hover:bg-slate-700 text-sm">
                  Export JSON
                </button>
                <label className="px-3 py-1.5 rounded-md bg-slate-800 hover:bg-slate-700 text-sm cursor-pointer">
                  Import JSON
                  <input type="file" accept="application/json" className="hidden" onChange={async (e) => {
                    const file = e.target.files?.[0];
                    if (!file) return;
                    try {
                      const text = await file.text();
                      const parsed = JSON.parse(text);
                      if (!parsed.projects || !Array.isArray(parsed.projects)) throw new Error('invalid');
                      if (!confirm('Replace current state with imported data?')) return;
                      setState(parsed);
                    } catch (err) { alert('Import failed: ' + err.message); }
                  }} />
                </label>
                <button
                  onClick={() => {
                    if (!confirm('Reset to initial demo state? This deletes everything.')) return;
                    localStorage.removeItem(STORAGE_KEY);
                    setState(initialState());
                  }}
                  className="px-3 py-1.5 rounded-md bg-red-600/15 border border-red-500/30 hover:bg-red-600/25 text-sm text-red-300">
                  Reset all
                </button>
              </div>
            </section>

            <div className="text-xs text-slate-600 pb-4">
              Harness v1 scaffold · designed for solo strategy/planning use ·
              data lives in browser until backend is wired
            </div>
          </div>
        </div>
      );
    }

    function Status({ label, ok, note }) {
      return (
        <div className="flex items-center gap-2 text-sm">
          <span className={`w-2 h-2 rounded-full ${ok ? 'bg-green-400' : 'bg-amber-400'}`}></span>
          <span>{label}</span>
          <span className="text-xs text-slate-500">— {ok ? 'connected' : note}</span>
        </div>
      );
    }

    // =====================================================================
    // MOBILE QUICK CAPTURE
    // =====================================================================
    function CaptureView(props) {
      const { project, updateProject, setState } = props;
      const [text, setText] = useState('');
      const [bucket, setBucket] = useState('about_me');
      const [saved, setSaved] = useState(false);

      const save = () => {
        const content = text.trim();
        if (!content) return;
        const fact = { id: uid(), bucket, content, createdAt: now() };
        updateProject(p => ({ ...p, memoryFacts: [fact, ...p.memoryFacts] }));
        setText('');
        setSaved(true);
        setTimeout(() => setSaved(false), 1500);
      };

      return (
        <div className="h-full p-4 flex flex-col">
          <h1 className="text-lg font-semibold mb-1">Quick capture</h1>
          <p className="text-xs text-slate-500 mb-4">Drop a thought into memory. Searchable later.</p>

          <textarea value={text} onChange={(e) => setText(e.target.value)} placeholder="What do you want to remember?" className="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:border-violet-500 resize-none" autoFocus />

          <div className="mt-3 space-y-2">
            <div className="text-xs text-slate-500">Bucket</div>
            <div className="grid grid-cols-3 gap-2">
              {MEMORY_BUCKETS.map(b => (
                <button key={b.id} onClick={() => setBucket(b.id)} className={`px-2 py-1.5 rounded-lg text-xs border ${bucket === b.id ? 'border-violet-500 bg-violet-600/15 text-violet-200' : 'border-slate-700 text-slate-400'}`}>
                  {b.name}
                </button>
              ))}
            </div>
          </div>

          <button onClick={save} disabled={!text.trim()} className="mt-3 px-4 py-2.5 rounded-lg bg-violet-600 hover:bg-violet-500 disabled:bg-slate-800 disabled:text-slate-600 text-white text-sm font-medium">
            {saved ? '✓ Saved' : 'Save to memory'}
          </button>

          <button onClick={() => setState(s => ({ ...s, view: 'chat' }))} className="mt-2 text-xs text-slate-400 underline">
            Or continue last session →
          </button>
        </div>
      );
    }

    // =====================================================================
    // RENDER
    // =====================================================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
